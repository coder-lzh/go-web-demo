# 基础通用配置
app:
  name: xinxiang-system
  version: 1.0.0

server:
  port: 8080
  mode: release

database:
  host: localhost
  port: 3306
  username: root
  password: 123456
  database: xinxiang
  charset: utf8mb4
  loc: Local
  log_mode: false
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

log:
  level: info
  format: json   # json, text
  file_path: logs/app.log # 日志文件路径
  max_size: 100  # 单个文件最大大小(MB)
  max_backups: 10 # 保留备份文件数
  max_age: 30    # 保留天数
  compress: false # 是否压缩备份
  console: true # 是否打印控制台